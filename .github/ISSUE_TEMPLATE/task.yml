name: Task
description: Plan-derived task (normally created by automation)
title: "[Task] "
labels:
  - type:task
body:
  - type: input
    id: parent
    attributes:
      label: Parent issue
      description: "Parent feature issue number, e.g. #42"
    validations:
      required: true
  - type: input
    id: task_id
    attributes:
      label: Task ID
      description: "From plan heading, e.g. Task 2"
    validations:
      required: true
  - type: input
    id: plan_path
    attributes:
      label: Plan file path
      description: "e.g. docs/superpowers/plans/2026-07-06-feature.md"
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Files
      description: Scoped files from plan **Files:** block
    validations:
      required: true
